version: "3.9"

services:
  bee6:
    build: .
    container_name: bee6_bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8066:8066"
    volumes:
      - ./results:/app/results
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8066/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
